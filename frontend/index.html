<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with PDF</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <main class="app-shell">

    <section class="hero">

      <div class="hero-left">
        <p class="eyebrow">FASTAPI + GEMINI + CHROMADB</p>

        <h1>
          Everything you need
          <br>
          to chat with PDFs
        </h1>

        <p class="subtitle">
          Upload a PDF, ask questions, and get answers instantly using
          Retrieval Augmented Generation powered by Gemini.
        </p>

        <div class="hero-actions">
          <input
            type="file"
            id="pdfInput"
            accept="application/pdf"
          />

          <button id="uploadBtn">
            Upload PDF
          </button>
        </div>

      </div>

      <div class="hero-right">

        <div class="status-card">

          <span class="status-label">
            Current Document
          </span>

          <strong id="currentDoc">
            No PDF uploaded
          </strong>

          <span class="muted" id="sessionLabel">
            Session Ready
          </span>

          <button id="resetBtn" class="secondary">
            Reset Session
          </button>

        </div>

      </div>

    </section>

    <section class="chat-wrapper">

      <div id="chatBox" class="chat-box">

        <div class="bot-message message">
          <div class="message-meta">Assistant</div>
          <div class="message-text">
            Upload a PDF to begin.
          </div>
        </div>

      </div>

      <div class="composer">

        <input
          type="text"
          id="questionInput"
          placeholder="Ask something about your PDF..."
          autocomplete="off"
        />

        <button id="sendBtn">
          Send
        </button>

      </div>

    </section>

  </main>

  <script src="/static/script.js"></script>

</body>
</html>
